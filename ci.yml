name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    name: Backend tests & lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: [3.10, 3.11]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

      - name: Run backend tests (if present)
        run: |
          set -e
          if python -m pytest --version >/dev/null 2>&1; then
            pytest -q || true
          fi

      - name: Lint backend (optional)
        run: |
          pip install flake8 || true
          flake8 backend || true

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm ci

      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build --if-present

      - name: Run frontend tests (optional)
        working-directory: frontend
        run: |
          npm test --silent || true

  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend image
        run: |
          docker build -f backend/Dockerfile -t cybershield-backend:latest ./backend

      - name: Build frontend image
        run: |
          docker build -f frontend/Dockerfile -t cybershield-frontend:latest ./frontend
